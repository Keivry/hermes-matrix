name: Hermes Matrix Rebuild

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check base image update status
        id: check
        uses: lucacome/docker-image-update-checker@v3
        with:
          base-image: nousresearch/hermes-agent:latest
          image: ghcr.io/${{ env.OWNER }}/hermes-matrix:latest

      - name: Show check result (always visible)
        run: |
          echo "🔍 Base image needs update: ${{ steps.check.outputs.needs-update }}"
          echo "Reason: ${{ steps.check.outputs.reason || 'N/A' }}"

      - name: Get hermes-agent version
        if: steps.check.outputs.needs-update == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          # Inspect without pulling the full image
          INSPECT=$(skopeo inspect docker://nousresearch/hermes-agent:latest 2>/dev/null)

          # Try OCI standard version label first
          VERSION=$(echo "$INSPECT" | jq -r '.Labels["org.opencontainers.image.version"] // ""')

          # Try generic version label
          if [ -z "$VERSION" ]; then
            VERSION=$(echo "$INSPECT" | jq -r '.Labels["version"] // ""')
          fi

          # Fallback: most recently updated non-latest tag from Docker Hub
          if [ -z "$VERSION" ]; then
            VERSION=$(curl -s "https://hub.docker.com/v2/repositories/nousresearch/hermes-agent/tags?page_size=100&ordering=-last_updated" | \
              jq -r '[.results[] | select(.name != "latest") | .name] | first // ""')
          fi

          # Final fallback: date-based
          if [ -z "$VERSION" ]; then
            VERSION="$(date +%Y%m%d)"
          fi

          echo "BASE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "📦 Hermes-agent version: $VERSION"

      - name: Build & Push if needed
        if: steps.check.outputs.needs-update == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.matrix
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ env.OWNER }}/hermes-matrix:latest
            ghcr.io/${{ env.OWNER }}/hermes-matrix:${{ env.BASE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Final summary (always run)
        if: always()
        run: |
          if [ "${{ steps.check.outputs.needs-update }}" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "🎉 Updated! Tags pushed: latest, ${{ env.BASE_VERSION }}"
          else
            echo "ℹ️ No update needed this time."
          fi
