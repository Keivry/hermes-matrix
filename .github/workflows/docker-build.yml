name: Build and Push Hermes Matrix to GHCR

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile.matrix"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get hermes-agent version
        run: |
          # Inspect without pulling the full image
          INSPECT=$(skopeo inspect docker://nousresearch/hermes-agent:latest 2>/dev/null)

          # Try OCI standard version label first
          VERSION=$(echo "$INSPECT" | jq -r '.Labels["org.opencontainers.image.version"] // ""')

          # Try generic version label
          if [ -z "$VERSION" ]; then
            VERSION=$(echo "$INSPECT" | jq -r '.Labels["version"] // ""')
          fi

          # Fallback: most recently updated non-latest tag from Docker Hub
          if [ -z "$VERSION" ]; then
            VERSION=$(curl -s "https://hub.docker.com/v2/repositories/nousresearch/hermes-agent/tags?page_size=100&ordering=-last_updated" | \
              jq -r '[.results[] | select(.name != "latest") | .name] | first // ""')
          fi

          # Final fallback: date-based
          if [ -z "$VERSION" ]; then
            VERSION="$(date +%Y%m%d)"
          fi

          echo "BASE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "📦 Hermes-agent version: $VERSION"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.matrix
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ env.OWNER }}/hermes-matrix:latest
            ghcr.io/${{ env.OWNER }}/hermes-matrix:${{ env.BASE_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Final summary
        if: always()
        run: |
          echo "🏷️ Tags pushed:"
          echo "  ghcr.io/${{ env.OWNER }}/hermes-matrix:latest"
          echo "  ghcr.io/${{ env.OWNER }}/hermes-matrix:${{ env.BASE_VERSION }}"
